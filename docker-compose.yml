services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-air_platform}
      POSTGRES_USER: ${POSTGRES_USER:-air_platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-air_platform}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-air_platform} -d ${POSTGRES_DB:-air_platform}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  backend:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://air_platform:air_platform@postgres:5432/air_platform}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      API_RELOAD: ${API_RELOAD:-true}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      RUN_SEED: ${RUN_SEED:-true}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      SCANNER_STORAGE_ROOT: ${SCANNER_STORAGE_ROOT:-/data/scanner-runs}
      GARAK_TIMEOUT_SECONDS: ${GARAK_TIMEOUT_SECONDS:-120}
      GARAK_TARGET_TYPE: ${GARAK_TARGET_TYPE:-test.Repeat}
      GARAK_GENERATIONS: ${GARAK_GENERATIONS:-1}
    ports:
      - "${API_HOST_PORT:-8000}:${API_PORT:-8000}"
    volumes:
      - ./apps/api:/app
      - scanner_data:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:${API_PORT:-8000}/health')); assert data['status'] == 'ok'\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/backend}
      NEXT_INTERNAL_API_URL: ${NEXT_INTERNAL_API_URL:-http://backend:8000}
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres_data:
  web_node_modules:
  web_next:
  scanner_data:
